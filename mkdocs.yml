site_name: API Biblioteca Universitaria - Documentación
site_description: Documentación técnica de la API de Scraping con Node.js y Cheerio.
site_author: Gustavo Gallegos

theme:
  name: material
  language: es
  palette:
    # Esquema Claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    
    # Esquema Oscuro (Slate)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.sections
    - content.code.copy

nav:
  - 'Inicio': index.md
  - 'Evidencia y Pruebas': pruebas.md

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

# Agregar el pie de página con tu autoría
copyright: Copyright &copy; 2026 Gustavo Gallegos

# Agregar los íconos de redes sociales
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GGallegosO
      name: Repositorios en GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/GGallegosO
      name: Perfil Profesional en LinkedIn
  generator: false

